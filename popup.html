<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Context Translator</title>
    <link rel="stylesheet" href="src/popup/popup.css">
  </head>
  <body>
    <main class="app">
      <section class="language-card">
        <label class="field">
          <span id="sourceLanguageSrLabel" class="sr-only">Source language</span>
          <select id="sourceLanguage" aria-label="Source language"></select>
        </label>

        <button
          id="swapLanguages"
          class="swap-button"
          type="button"
          aria-label="Swap source and target languages"
        >
          ↔
        </button>

        <label class="field">
          <span id="targetLanguageSrLabel" class="sr-only">Target language</span>
          <select id="targetLanguage" aria-label="Target language"></select>
        </label>
      </section>

      <section class="options">
        <label class="checkbox-row">
          <input id="alwaysTranslateLanguage" type="checkbox">
          <span id="alwaysTranslateLanguageLabel">Always translate source language</span>
        </label>

        <label class="checkbox-row">
          <input id="alwaysTranslateSite" type="checkbox">
          <span id="alwaysTranslateSiteLabel">Always translate this site</span>
        </label>
        <p id="siteHint" class="hint"></p>

        <label class="checkbox-row">
          <input id="showOriginalOnHover" type="checkbox">
          <span id="showOriginalOnHoverLabel">Show original on hover</span>
        </label>
      </section>

      <section class="api-section">
        <label id="apiKeyLabel" class="section-label" for="apiKey">Gemini API key</label>
        <input
          id="apiKey"
          class="api-input"
          type="password"
          placeholder="AIza..."
          autocomplete="off"
          spellcheck="false"
        >

        <div class="api-actions">
          <button id="saveApiKey" class="secondary-button" type="button">Save</button>
          <button id="clearApiKey" class="ghost-button" type="button">Clear</button>
        </div>

        <div class="api-server-status">
          <div class="api-server-status__summary">
            <span id="apiServerStatusLabel" class="api-server-status__label">API status</span>
            <span
              id="apiServerStatus"
              class="api-server-status__value"
              role="status"
              aria-live="polite"
              aria-atomic="true"
            >No API key yet.</span>
          </div>
          <button id="checkApiStatus" class="ghost-button api-server-status__button" type="button">
            Check
          </button>
        </div>
      </section>

      <p id="statusMessage" class="status" role="status" aria-live="polite"></p>

      <button id="translateButton" class="translate-button" type="button">Translate</button>
    </main>

    <script type="module" src="src/popup/popup.js"></script>
  </body>
</html>
